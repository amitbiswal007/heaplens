name: Bug Report
description: Report a problem with HeapLens
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open a .hprof file (~50MB)
        2. Go to the Dominator Tree tab
        3. Click "Why alive?" on a node
        4. Error appears...
    validations:
      required: true

  - type: dropdown
    id: tab
    attributes:
      label: Affected Tab
      description: Which tab does this affect?
      options:
        - Overview
        - Histogram
        - Dominator Tree
        - Leak Suspects
        - Waste
        - Source
        - Query (HeapQL)
        - Compare
        - Timeline
        - AI Chat
        - Extension activation / general
    validations:
      required: true

  - type: input
    id: heap-size
    attributes:
      label: Heap Dump Size
      description: Approximate size of the .hprof file.
      placeholder: e.g., 250 MB

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: e.g., 1.96.0

  - type: input
    id: extension-version
    attributes:
      label: HeapLens Version
      placeholder: e.g., 0.1.3

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Windows (x64)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant output from the HeapLens output channel (View > Output > HeapLens).
      render: text
