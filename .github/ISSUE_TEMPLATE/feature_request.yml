name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see? Why would it be useful?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of HeapLens does this relate to?
      options:
        - Analysis engine (Rust)
        - UI / Webview
        - HeapQL query language
        - AI Chat / LLM integration
        - Source code bridge
        - Compare / Timeline
        - New file format support
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
